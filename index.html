<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading Assistant - XAU/USD</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #38bdf8;
            margin-bottom: 5px;
        }
        .status-badge {
            display: inline-block;
            background: #10b981;
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .chart-container {
            height: 600px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 AI Trading Assistant</h1>
        <p>XAU/USD লাইভ মনিটরিং ও ক্যান্ডেলস্টিক অ্যালার্ট ড্যাশবোর্ড</p>
        <div class="status-badge">● ২৪/৭ সিস্টেম সক্রিয়</div>
    </div>

    <!-- TradingView Widget -->
    <div class="chart-container">
        <div id="tradingview_xauusd" style="height: 100%; width: 100%;"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "OANDA:XAUUSD",
            "interval": "15",
            "timezone": "Asia/Kolkata",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_legend": false,
            "save_image": false,
            "container_id": "tradingview_xauusd"
        });
    </script>

</body>
</html>
